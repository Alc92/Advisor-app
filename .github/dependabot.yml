version: 2
updates:
    - package-ecosystem: composer
      directory: /
      schedule:
          interval: weekly
      open-pull-requests-limit: 5
      ignore:
          - dependency-name: "symfony/*"
            versions:
                - "8.x"

    - package-ecosystem: github-actions
      directory: /
      schedule:
          interval: weekly
      open-pull-requests-limit: 5
